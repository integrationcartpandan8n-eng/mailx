version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mailx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mailx
      POSTGRES_PASSWORD: mailx_secret
      POSTGRES_DB: mailx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailx"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
