<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailX — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(0, 77, 232, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(0, 77, 232, 0.05) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-2%, -1%) scale(1.05); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: rgba(17, 22, 38, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 48px 36px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo img {
            height: 42px;
            margin-bottom: 8px;
        }
        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .logo-text span {
            color: #004de8;
        }
        .logo-sub {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 14px 16px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s;
        }
        .form-group input:focus {
            border-color: #004de8;
            box-shadow: 0 0 0 3px rgba(0, 77, 232, 0.15);
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .btn-login {
            width: 100%;
            background: #004de8;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn-login:hover {
            background: #0040c0;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 77, 232, 0.4);
        }
        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            color: #ff6b6b;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        .error-msg.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .footer-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-text">Mail<span>X</span></div>
                <div class="logo-sub">Painel Administrativo</div>
            </div>

            <div class="error-msg" id="errorMsg">
                Senha incorreta. Tente novamente.
            </div>

            <form method="POST" action="/admin/login">
                <div class="form-group">
                    <label>Senha de acesso</label>
                    <input type="password" name="password" placeholder="Digite a senha" autofocus required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <div class="footer-text">MailX Group &copy; 2026</div>
        </div>
    </div>

    <script>
        if (window.location.search.includes('error=1')) {
            document.getElementById('errorMsg').classList.add('show');
        }
    </script>
</body>
</html>
